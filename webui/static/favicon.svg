      C -95.2,-2.8, -72.8,-39.2, -36.4,-56
      C 2.8,-72.8, 42,-53.2, 56,-16.8
      C 70,19.6, 53.2,58.8, 19.6,72.8
      L 70,72.8
      C 84,72.8, 95.2,61.6, 95.2,47.6
      L 95.2,33.6
    " fill="none" stroke="url(#spiralGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
